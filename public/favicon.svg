  <!-- nodes -->
  <circle cx="16" cy="14" r="4.5" fill="#5ba3d9"/>
  <circle cx="37" cy="19" r="4.5" fill="#5ba3d9"/>
  <circle cx="56" cy="30" r="4.5" fill="#5ba3d9"/>
  <circle cx="70" cy="44" r="4.5" fill="#5ba3d9"/>
  <circle cx="80" cy="61" r="4.5" fill="#5ba3d9"/>
  <!-- anchor node -->
