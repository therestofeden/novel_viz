<svg width="32" height="32" viewBox="0 0 100 100"
     xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- background -->
  <rect width="100" height="100" fill="#07101e"/>
  <!-- page rays -->
  <line x1="9" y1="91" x2="16" y2="14" stroke="#5ba3d9" stroke-width="1.5" opacity="0.34"/>
  <line x1="9" y1="91" x2="37" y2="19" stroke="#5ba3d9" stroke-width="1.5" opacity="0.34"/>
  <line x1="9" y1="91" x2="56" y2="30" stroke="#5ba3d9" stroke-width="1.5" opacity="0.34"/>
  <line x1="9" y1="91" x2="70" y2="44" stroke="#5ba3d9" stroke-width="1.5" opacity="0.34"/>
  <line x1="9" y1="91" x2="80" y2="61" stroke="#5ba3d9" stroke-width="1.5" opacity="0.34"/>
  <!-- outer arc -->
  <path d="M 16 14 A 77 77 0 0 1 80 61" stroke="#5ba3d9" stroke-width="1.9"/>
  <!-- character connections -->
  <line x1="16" y1="14" x2="56" y2="30" stroke="#5ba3d9" stroke-width="1.3"/>
  <line x1="37" y1="19" x2="70" y2="44" stroke="#5ba3d9" stroke-width="1.3"/>
