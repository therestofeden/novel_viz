<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / home-screen meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NovelViz" />
    <meta name="theme-color" content="#3b312b" />
    <meta name="msapplication-TileColor" content="#3b312b" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>NovelViz — Visualize Any Book&#39;s Characters, Concepts &amp; Timelines</title>
    <meta name="description" content="Type any book&#39;s title and instantly see it mapped: characters, relationships, and timelines for fiction; concepts, arguments, and chapters for non-fiction.">
    <meta name="author" content="NovelViz" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Every data call in the app (popular-books on mount, search-books per
      keystroke, analyze-novel on submit) hits the Supabase project origin,
      which is a *different* origin than the app itself. Without a
      preconnect hint, the FIRST request of each page load pays DNS + TCP +
      TLS handshake cost (100-300ms) before the request even starts —
      right on the critical path for both initial load and the first
      autocomplete keystroke. %VITE_SUPABASE_URL% is replaced at build time
      by Vite from the env var, so this stays correct if the project ref
      ever changes.
    -->
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin />
    <link rel="dns-prefetch" href="%VITE_SUPABASE_URL%" />
    <!--
      Non-blocking font load: a plain <link rel="stylesheet"> here blocks
      first paint on a second network hop (googleapis.com -> gstatic.com)
      before ANY pixel renders, for every visitor, cache or no cache.
      media="print" makes the browser fetch it without blocking render;
      onload flips it to "all" once it's in. <noscript> covers JS-disabled.
      &display=swap (already in the URL) then avoids invisible text while
      the font file itself streams in.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" />
    </noscript>

    <!-- Open Graph (default / home page) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="NovelViz — Visualize Any Book&#39;s Characters, Concepts &amp; Timelines" />
    <meta property="og:description" content="Type any book&#39;s title and instantly see it mapped: characters, relationships, and timelines for fiction; concepts, arguments, and chapters for non-fiction." />
    <meta property="og:image"       content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/af52b75f-8a56-4b28-b3aa-e8a49dfb0b4c/id-preview-85ee75f8--e57fd034-cebd-490e-b5aa-76db1aae38ee.lovable.app-1778804999276.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="NovelViz — Visualize Any Book&#39;s Characters, Concepts &amp; Timelines" />
    <meta name="twitter:description" content="Type any book&#39;s title and instantly see it mapped: characters, relationships, and timelines for fiction; concepts, arguments, and chapters for non-fiction." />
    <meta name="twitter:image"       content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/af52b75f-8a56-4b28-b3aa-e8a49dfb0b4c/id-preview-85ee75f8--e57fd034-cebd-490e-b5aa-76db1aae38ee.lovable.app-1778804999276.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
