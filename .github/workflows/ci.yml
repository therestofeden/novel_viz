name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy client-side values so the build never depends on secrets.
          # Real values are injected at deploy time, not in CI.
          VITE_SUPABASE_PROJECT_ID: ci-placeholder
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
